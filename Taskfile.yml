version: 3

tasks:
  init:
    deps:
      - init.js
      - init.hooks

  init.js:
    dir: ./web
    cmds:
      - bun install

  init.hooks:
    cmds:
      - rm -rf .git/hooks
      - ln -s ../.hooks .git/hooks

  update.go:
    cmds:
      - go get -u tool # updates every module in the go.mod tool() directive
      - go get -u ./...
      - go mod tidy

  update.web:
    dir: ./web
    cmds:
      - bun update --latest
      - bun install

  db.migrate:
    cmds:
      - go tool goose sqlite3 -dir ./db/migrations ./data/sqlite.db up

  gen.templ:
    cmds:
      - go tool templ generate

  gen.db:
    cmds:
      - go tool sqlc generate

  dev:
    cmds:
      - task init
      - task dev.tailwind &
      - task dev.web &
      - task dev.sql &
      - task dev.go

  dev.tailwind:
    dir: ./web
    cmds:
      - bunx tailwindcss -i tailwind.css -o static/tailwind.css --watch --minify --cwd .

  dev.web:
    dir: ./web
    cmds:
      - |
        go tool wgo \
        -debounce=256ms \
        -xdir=node_modules \
        -xdir=tmp \
        -xdir=static \
        -file='\.ts$' \
        -file='\.css$' \
        bun run build.ts :: go tool templ generate --notify-proxy

  dev.sql:
    dir: ./db
    cmds:
      - |
        go tool wgo \
          -debounce=256ms \
          -file=.sql \
          go tool sqlc generate

  dev.go:
    env:
      TEMPL_DEV_MODE: true
      # Avoids inlining and optimizations, useful for debugging
      GOFLAGS: "-gcflags=-N -gcflags=-l"
    cmds:
      - |
        go tool templ generate \
        --log-level=info \
        --watch \
        --watch-pattern='(.+\.go$)|(.+\.templ$)' \
        --path=. \
        --proxy="http://localhost:8080" \
        --open-browser=false \
        --cmd='./scripts/dev-run.sh'

  build.docker.run:
    cmds:
      - task build.docker
      - |
        docker run --rm \
        -v $(pwd)/data:/app/data \
        -p 8080:8080 \
        backwegotemplate:latest

  build.docker:
    cmds:
      - docker build -t backwegotemplate:latest .

  build.go:
    cmds:
      - task init.js
      - rm -rf web/static/*
      - task build.go.assets
      # -s -w strips symbols and debuginfo, -trimpath removes module relative paths
      - go build -ldflags="-s -w" -trimpath -o ./bin/app ./cmd/serve

  build.go.assets:
    deps:
      - gen.templ
      - build.tailwind
      - build.web

  build.tailwind:
    dir: web
    cmds:
      - bunx tailwindcss -i tailwind.css -o static/tailwind.css --minify --cwd .

  build.web:
    dir: web
    cmds:
      - ENV=prod bun run build.ts

  check:
    desc: Run all checks (formatting, linting, compile)
    deps:
      - check.go
      - check.web

  check.go:
    desc: Go templ generate, vet and compile check
    cmds:
      - go tool templ generate
      - |
        go vet ./... & p1=$!
        go build ./... & p2=$!
        ec=0; wait $p1 || ec=$?; wait $p2 || ec=$?; exit $ec

  check.web:
    desc: Prettier, ESLint, TypeScript, and build check (parallel)
    dir: ./web
    cmds:
      - |
        bunx prettier --check . & p1=$!
        bunx eslint . & p2=$!
        bunx typescript-7 --noEmit & p3=$!
        bun run build.ts & p4=$!
        ec=0
        wait $p1 || ec=$?
        wait $p2 || ec=$?
        wait $p3 || ec=$?
        wait $p4 || ec=$?
        exit $ec
