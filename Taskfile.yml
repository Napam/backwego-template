version: 3

tasks:
  init:
    cmds:
      - task init.js

  init.js:
    dir: ./web
    cmds:
      - bun install

  update.go:
    cmds:
      - go get -u tool # updates every module in the go.mod tool() directive
      - go get -u ./...
      - go mod tidy

  update.web:
    dir: ./web
    cmds:
      - bun update --latest
      - bun install

  db.migrate:
    cmds:
      - go tool goose sqlite3 -dir ./db/migrations ./data/sqlite.db up

  gen.templ:
    cmds:
      - go tool templ generate

  gen.db:
    cmds:
      - go tool sqlc generate

  dev:
    cmds:
      - task init
      - task dev.tailwind &
      - task dev.web &
      - task dev.sql &
      - task dev.go

  dev.tailwind:
    dir: ./web
    cmds:
      - bunx tailwindcss -i tailwind.css -o static/tailwind.css --watch --minify --cwd .

  dev.web:
    dir: ./web
    cmds:
      - |
        go tool wgo \
        -debounce=256ms \
        -xdir=node_modules \
        -xdir=tmp \
        -xdir=static \
        -file='\.ts$' \
        -file='\.css$' \
        bun run build.ts :: go tool templ generate --notify-proxy

  dev.sql:
    dir: ./db
    cmds:
      - |
        go tool wgo \
          -debounce=256ms \
          -file=.sql \
          go tool sqlc generate

  dev.go:
    env:
      TEMPL_DEV_MODE: true
      # Avoids inlining and optimizations, useful for debugging
      GOFLAGS: "-gcflags=-N -gcflags=-l"
    cmds:
      - |
        go tool templ generate \
        --log-level=info \
        --watch \
        --watch-pattern='(.+\.go$)|(.+\.templ$)' \
        --path=. \
        --proxy="http://localhost:8080" \
        --open-browser=false \
        --cmd='go run -tags=devlocal ./cmd/serve/main.go'

  build.docker.run:
    cmds:
      - task build.docker
      - |
        docker run --rm \
        -v $(pwd)/data:/app/data \
        -p 8080:8080 \
        backwegotemplate:latest

  build.docker:
    cmds:
      - docker build -t backwegotemplate:latest .

  build.go:
    cmds:
      - task init.js
      - rm -rf web/static/*
      - task gen.templ & task build.tailwind & task build.web & wait
      # -s -w strips symbols and debuginfo, -trimpath removes module relative paths
      - go build -ldflags="-s -w" -trimpath -o ./bin/app ./cmd/serve

  build.tailwind:
    dir: web
    cmds:
      - bunx tailwindcss -i tailwind.css -o static/tailwind.css --minify --cwd .

  build.web:
    dir: web
    cmds:
      - ENV=prod bun run build.ts

  check:
    desc: Run all checks (formatting, linting, compile)
    cmds:
      - task: check.templ
      - task: check.go
      - task: check.web

  check.go:
    desc: Go vet and compile check
    cmds:
      - go vet ./...
      - go build ./...

  check.templ:
    desc: Templ generate check (ensures .templ files compile)
    cmds:
      - go tool templ generate
      - go vet ./...

  check.web:
    desc: TypeScript type check
    dir: ./web
    cmds:
      - bunx tsc --noEmit
